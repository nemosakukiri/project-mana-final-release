<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OFFICIAL RECORD | 行政不作為の記録</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Public+Sans:wght@400;700&display=swap" rel="stylesheet"/>
<style>body { background-color: #fdf9f4; color: #1c1c19; font-family: 'Public Sans', sans-serif; } * { border-radius: 0px !important; }</style>
</head>
<body class="p-6 md:p-12 text-justify">
<header class="max-w-4xl mx-auto mb-16 border-l-8 border-[#b02d21] pl-8">
  <p class="text-xs font-bold text-[#b02d21] tracking-[0.4em] uppercase mb-4">Urgent Indictment Log #001</p>
  <h1 class="text-4xl md:text-5xl font-['Noto_Serif_JP'] font-black leading-tight text-[#00000b]">京都市右京区・責任者による<br/>「法治主義の放棄」と生存権侵害の記録</h1>
  <div class="mt-6 flex gap-4">
    <span class="bg-[#b02d21] text-white px-3 py-1 text-[10px] font-bold uppercase tracking-widest">法務局報告済み</span>
    <span class="bg-[#00000b] text-white px-3 py-1 text-[10px] font-bold uppercase tracking-widest">公式自白記録あり</span>
  </div>
</header>
<main class="max-w-4xl mx-auto space-y-16">
  <section class="border-l-2 border-black pl-8">
    <h2 class="text-xs font-bold text-[#b02d21] tracking-widest uppercase mb-8">【事実経過】責任者による自白記録</h2>
    <div class="space-y-10">
      <div class="bg-white p-10 shadow-sm border border-gray-100">
        <p class="text-xs text-[#b02d21] font-bold mb-4 uppercase tracking-widest">自白 01</p>
        <p class="text-2xl font-['Noto_Serif_JP'] font-bold leading-relaxed">「法律で仕事をしていない」</p>
        <p class="mt-6 text-sm text-gray-500 italic">法的評価：憲法99条および地方公務員法32条に違反。公務員自らによる、法に基づかない恣意的な運用の自白。</p>
      </div>
      <div class="bg-[#00000b] text-white p-10 shadow-lg">
        <p class="text-xs text-white/50 font-bold mb-4 uppercase tracking-widest">外部機関への通報に対する回答</p>
        <p class="text-2xl font-['Noto_Serif_JP'] font-bold leading-relaxed">「はいはい、どこにでも行ってください」</p>
        <p class="mt-6 text-sm text-white/60 italic">法的評価：説明責任の放棄。市民の正当な権利行使を公然と嘲笑した事実の記録。</p>
      </div>
    </div>
  </section>
  <div class="text-center pt-12">
    <a href="index.html" class="text-sm font-bold border-b-2 border-black pb-1 hover:text-[#b02d21] transition-all">← ポータルへ戻る</a>
  </div>
</main>
</body>
</html>
